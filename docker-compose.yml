version: "3.9"

services:

  # --- PostgreSQL 16 ---
  db:
    image: postgres:16-alpine
    container_name: ureport-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ureport
      POSTGRES_USER: ureport
      POSTGRES_PASSWORD: ureport
    volumes:
      - ureport_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ureport -d ureport"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Spring Boot API ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ureport-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ureport
      POSTGRES_PASSWORD: ureport
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --- Nginx / React frontend (placeholder) ---
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ureport-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  ureport_data:
    driver: local
