open311:
  obsolete-api-keys: test-obsolete-key

jwt:
  secret: test-secret-32-characters-minimum-length-here
  expiry-seconds: 3600
  issuer: ureport-test

ldap:
  enabled: false

cas:
  enabled: false

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
