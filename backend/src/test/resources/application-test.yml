spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

management:
  health:
    db:
      enabled: false
    ldap:
      enabled: false
  endpoint:
    health:
      show-details: never

jwt:
  secret: test-secret-32-characters-minimum-length
  expiry-seconds: 3600
  issuer: ureport-test

ldap:
  enabled: false

cas:
  enabled: false
