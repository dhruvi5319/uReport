open311:
  obsolete-api-keys: test-obsolete-key

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ureport
    driver-class-name: org.postgresql.Driver
    username: ureport
    password: ureport
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: false
  # Mail config for tests — localhost (non-fatal; no real SMTP server needed)
  mail:
    host: localhost
    port: 25

jwt:
  secret: test-secret-key-for-testing-only-must-be-at-least-32-chars
  expiry-seconds: 3600
  issuer: ureport-test

ldap:
  enabled: false

cas:
  enabled: false

media:
  root: /tmp/ureport-test-media

notification:
  reply-email: noreply@ureport-test.local
