# Server - bind to 0.0.0.0 per runtime environment contract
server.port=3000
server.address=0.0.0.0

# Database - sidecar-injected DATABASE_URL is converted to JDBC format by
# DatabaseUrlEnvironmentPostProcessor before this is read.
# Fallback: local dev PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ureport}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway - runs idempotent migrations before serving requests
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Security
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-minimum-32chars}
app.jwt.expiration-ms=86400000

# Media
app.media.base-url=http://localhost:3000/media
media.root=${MEDIA_ROOT:/var/ureport/media}
media.max-file-size-bytes=10485760

# SMTP Mail configuration (non-fatal; email failure is logged but not thrown)
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:25}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000

# Notification defaults
notification.reply-email=${NOTIFICATION_REPLY_EMAIL:noreply@ureport.local}
