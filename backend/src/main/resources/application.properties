# Server - bind to 0.0.0.0 per runtime environment contract
server.port=3000
server.address=0.0.0.0

# Database - sidecar-injected DATABASE_URL is converted to JDBC format by
# DatabaseUrlEnvironmentPostProcessor before this is read.
# Fallback: local dev PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ureport}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway - runs idempotent migrations before serving requests
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Security
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-minimum-32chars}
app.jwt.expiration-ms=86400000

# Media
app.media.base-url=http://localhost:3000/media
