# Server
server.port=3000
server.address=0.0.0.0

# Database - sidecar-injected DATABASE_URL takes precedence
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ureport}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Security
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-32chars-long}
app.jwt.expiration-ms=86400000

# Media
app.media.base-url=http://localhost:3000/media
