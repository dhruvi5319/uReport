# Test profile — use native sidecar PostgreSQL injected via DATABASE_URL
# The DatabaseUrlEnvironmentPostProcessor converts postgres:// → jdbc:postgresql://
# Flyway runs migrations; tests run against a real DB (not Testcontainers)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
