spring:
  application:
    name: ureport-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ureport}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USER:ureport}
    password: ${MYSQL_PASSWORD:ureport}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      pool-name: UReportHikariPool

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  port: 8080
  address: 0.0.0.0

jwt:
  secret: ${JWT_SECRET:default-dev-secret-that-is-at-least-32-characters}
  expiry-seconds: ${JWT_EXPIRY:28800}
  issuer: ureport

ldap:
  enabled: ${LDAP_ENABLED:false}
  url: ${LDAP_URL:ldap://localhost:389}
  base-dn: ${LDAP_BASE_DN:dc=city,dc=gov}
  user-dn-pattern: uid={0},ou=people

cas:
  enabled: ${CAS_ENABLED:false}
  server-url: ${CAS_SERVER_URL:https://cas.city.gov}
  service-url: ${CAS_SERVICE_URL:https://ureport.city.gov}

open311:
  obsolete-api-keys: ${OPEN311_OBSOLETE_API_KEYS:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
