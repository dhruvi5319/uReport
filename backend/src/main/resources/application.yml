spring:
  application:
    name: ureport-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ureport}
    username: ${DB_USER:ureport}
    password: ${DB_PASSWORD:ureport}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      pool-name: UReportHikariPool

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    clean-disabled: true

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:25}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:default-dev-secret-that-is-at-least-32-characters}
  expiry-seconds: ${JWT_EXPIRY:28800}
  issuer: ureport

ldap:
  enabled: ${LDAP_ENABLED:false}
  url: ${LDAP_URL:ldap://localhost:389}
  base-dn: ${LDAP_BASE_DN:dc=city,dc=gov}
  user-dn-pattern: uid={0},ou=people

cas:
  enabled: ${CAS_ENABLED:false}
  server-url: ${CAS_SERVER_URL:https://cas.city.gov}
  service-url: ${CAS_SERVICE_URL:https://ureport.city.gov}

open311:
  obsolete-api-keys: ${OPEN311_OBSOLETE_API_KEYS:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

media:
  root: ${MEDIA_ROOT:/var/ureport/media}
  max-file-size-bytes: 10485760    # 10 MB

notification:
  reply-email: ${NOTIFICATION_REPLY_EMAIL:noreply@ureport.local}
