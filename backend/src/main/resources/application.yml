spring:
  application:
    name: ureport-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ureport}
    username: ${DB_USER:ureport}
    password: ${DB_PASSWORD:ureport}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET}
  expiry-seconds: ${JWT_EXPIRY:28800}
  issuer: ureport

ldap:
  enabled: ${LDAP_ENABLED:false}
  url: ${LDAP_URL:ldap://localhost:389}
  base-dn: ${LDAP_BASE_DN:dc=city,dc=gov}
  user-dn-pattern: uid={0},ou=people

cas:
  enabled: ${CAS_ENABLED:false}
  server-url: ${CAS_SERVER_URL:https://cas.city.gov}
  service-url: ${CAS_SERVICE_URL:https://ureport.city.gov}
